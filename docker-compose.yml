services:
  backend:
    build: ./backend
    environment:
      AQUARIUM_DATA_DIR: /data
      AQUARIUM_DEFAULT_LOCALE: ${AQUARIUM_DEFAULT_LOCALE:-ko}
    volumes:
      - ./data:/data
    ports:
      - "8008:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3008:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aquarium}
      POSTGRES_USER: ${POSTGRES_USER:-aquarium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aquarium}
    volumes:
      - aquarium-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  searxng:
    image: searxng/searxng:latest
    profiles: ["search"]
    ports:
      - "8088:8080"

volumes:
  aquarium-postgres:
