name: Local Runtime CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Backend tests
        working-directory: backend
        run: |
          uv sync --group dev
          uv run pytest -q
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend tests and build
        working-directory: frontend
        run: |
          npm ci
          npm test
          npm run build
      - name: Compose config
        run: docker compose config --quiet
      - name: Browser E2E
        run: |
          cd frontend
          npx playwright install --with-deps chromium
          cd ..
          trap 'docker compose down -v' EXIT
          docker compose up --build -d
          python - <<'PY'
          import time, urllib.request
          for url in ('http://127.0.0.1:8008/api/health', 'http://127.0.0.1:3008'):
              deadline = time.time() + 90
              last = None
              while time.time() < deadline:
                  try:
                      with urllib.request.urlopen(url, timeout=3) as response:
                          if response.status < 500:
                              break
                  except Exception as exc:
                      last = exc
                      time.sleep(2)
              else:
                  raise SystemExit(f'{url} not ready: {last}')
          PY
          E2E_BASE_URL=http://127.0.0.1:3008 npm --prefix frontend run test:e2e
